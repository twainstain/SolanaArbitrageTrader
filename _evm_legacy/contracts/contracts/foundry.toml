[profile.default]
src = "."
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
ethereum = "${RPC_ETHEREUM}"
arbitrum = "${RPC_ARBITRUM}"
base = "${RPC_BASE}"
optimism = "${RPC_OPTIMISM}"

[etherscan]
ethereum = { key = "${ETHERSCAN_API_KEY}" }
arbitrum = { key = "${ARBISCAN_API_KEY}" }
base = { key = "${BASESCAN_API_KEY}" }
